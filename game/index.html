<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar Animado - Exibição</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="display-page">
    <!-- Fundo animado (partículas geradas via JS) -->
    <div id="particles-container"></div>

    <main class="scoreboard-wrapper">
        <header>
            <h1 class="neon-text">RANKING <span class="highlight">GAMER</span></h1>
        </header>

        <!-- Onde as equipes serão renderizadas dinamicamente -->
        <div id="teams-grid" class="teams-grid">
            <!-- Cards injetados via script.js -->
        </div>
    </main>

    <!-- CDNs: Canvas Confetti e Pusher -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://js.pusher.com/8.0/pusher.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
