<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar Game</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2307080d'/%3E%3Cpath d='M14 44h36v6H14zM18 34h28v6H18zM22 24h20v6H22z' fill='%2300e5ff'/%3E%3Cpath d='M32 8l5.5 11.2L50 21l-9 8.8L43.1 42 32 36.1 20.9 42 23 29.8 14 21l12.5-1.8L32 8z' fill='%23ff2d7a'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./style.css">
</head>
<body id="display-page">
  <div id="particles-container" aria-hidden="true"></div>
  <div id="fireworks-container" aria-hidden="true"></div>
  <div id="level-celebration" class="level-celebration" aria-live="polite" aria-hidden="true">
    <div class="celebration-panel">
      <p>Nova fase desbloqueada</p>
      <strong id="celebration-team-name"></strong>
      <span id="celebration-stage-name"></span>
    </div>
  </div>

  <main class="scoreboard-shell">
    <header class="scoreboard-header">
      <p class="eyebrow">Live Scoreboard</p>
      <h1>Zero t<span>o HERO</span></h1>
    </header>

    <div class="scoreboard-content">
      <aside class="sponsors-panel" aria-label="Patrocinadores">
        <p class="sponsors-title">Patrocinadores</p>
        <div id="sponsors-logos" class="sponsors-logos" aria-live="polite"></div>
      </aside>

      <section id="teams-grid" class="teams-grid" aria-live="polite"></section>
    </div>

    <p id="empty-display" class="empty-state">
      Nenhuma equipe cadastrada ainda.
    </p>

    <section class="countdown-panel" aria-label="Contagem regressiva para encerramento">
      <span class="countdown-label">Tempo restante</span>
      <div id="countdown-timer" class="countdown-timer" aria-live="polite">
        <span><strong data-countdown-hours>--</strong>horas</span>
        <span><strong data-countdown-minutes>--</strong>min</span>
        <span><strong data-countdown-seconds>--</strong>seg</span>
      </div>
    </section>

    <footer class="site-footer">
      <a class="brand-logo" href="./index.html" aria-label="Startup Weekend Recife">
        <img src="https://r2.tswrecife.com.br/Logos/Startup%20Weekend%20Logo%20-%203%20WRITE%20orange.png" alt="Startup Weekend Recife">
      </a>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.10.8/dist/index.umd.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
