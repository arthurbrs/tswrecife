<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar Animado - Painel Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="admin-page">
    <main class="admin-wrapper">
        <header>
            <h1 class="neon-text">Painel <span class="highlight">Admin</span></h1>
        </header>

        <section class="admin-panel">
            <div class="card add-team-card">
                <h2>Cadastrar Nova Equipe</h2>
                
                    <div class="input-group">
<form id="add-team-form">
    <div class="input-group">
        <label for="team-name">Nome da Equipe</label>
        <input type="text" id="team-name" required placeholder="Ex: Cyber Ninjas">
    </div>
    <button type="submit" class="btn-primary">Adicionar Equipe</button>
</form>
            </div>

            <div class="card team-list-card">
                <h2>Equipes Cadastradas</h2>
                <ul id="admin-teams-list" class="admin-list">
                    <!-- Lista gerada via JS -->
                </ul>
            </div>
        </section>
    </main>

    <!-- CDN Oficial do Pusher incluída conforme solicitado -->
    <script src="https://js.pusher.com/8.0/pusher.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
