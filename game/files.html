<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arquivos | Placar Game</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body id="files-page">
  <main class="admin-shell storage-shell">
    <header class="admin-header storage-header">
      <div>
        <p class="eyebrow">Control Room</p>
        <h1>Central de <span>Arquivos</span></h1>
      </div>
      <a class="ghost-button button-link" href="./admin.html">← Voltar às equipes</a>
    </header>

    <form id="login-form" class="panel auth-panel">
      <h2>Acesso restrito</h2>
      <label class="field"><span>Senha do admin</span><input id="admin-password" type="password" autocomplete="current-password" required></label>
      <button class="primary-button" type="submit">Entrar</button>
      <p id="auth-message" class="admin-message" role="status"></p>
    </form>

    <section id="admin-content" class="storage-workspace is-hidden">
      <section class="storage-topbar">
        <div class="storage-location">
          <span>Você está em</span>
          <nav id="storage-breadcrumbs" class="storage-breadcrumbs" aria-label="Caminho da pasta"></nav>
        </div>
        <div class="storage-toolbar">
          <button id="storage-up" class="ghost-button" type="button">↑ Subir</button>
          <button id="storage-new-folder" class="ghost-button" type="button">+ Nova pasta</button>
          <button id="logout-admin" class="danger-button" type="button">Sair</button>
        </div>
      </section>

      <input id="storage-prefix" type="hidden" value="">

      <section class="storage-upload-card">
        <div>
          <p class="storage-upload-eyebrow">Destino do upload</p>
          <strong id="storage-upload-target"></strong>
          <p>Os arquivos enviados aparecerão nesta pasta.</p>
        </div>
        <form id="upload-form" class="storage-upload-form">
          <label class="storage-file-picker" for="storage-files">
            <span>Selecionar arquivos</span>
            <small>Até 25 MB por arquivo</small>
          </label>
          <input id="storage-files" type="file" multiple required>
          <button class="primary-button" type="submit">Enviar para esta pasta</button>
        </form>
      </section>

      <p id="storage-message" class="admin-message" role="status"></p>

      <section class="storage-browser">
        <div class="storage-section-heading"><h2>Pastas</h2><span id="storage-folder-count"></span></div>
        <div id="storage-folders-list" class="storage-folders"></div>
        <div class="storage-section-heading"><h2>Arquivos</h2><span id="storage-file-count"></span></div>
        <ul id="storage-files-list" class="storage-list"></ul>
      </section>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
